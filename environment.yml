name: cognarc
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # ── Python ──────────────────────────────────────────────────
  - python=3.12.0

  # ── CUDA Toolkit (matches RTX 4050 / CUDA 13.2 driver) ─────
  # Using 12.4 toolkit — backward compatible with 13.2 driver
  - pytorch::pytorch=2.6.0
  - pytorch::torchvision=0.21.0
  - pytorch::pytorch-cuda=12.4

  # ── System Utilities ────────────────────────────────────────
  - pip
  - git
  - curl
  - build-essential

  # ── Python packages via pip ─────────────────────────────────
  - pip:
    # FastAPI Backend
    - fastapi==0.115.12
    - uvicorn[standard]==0.34.2
    - motor==3.7.1
    - pymongo==4.12.1
    - supabase==2.15.1
    - upstash-redis==1.3.0
    - pydantic==2.11.4
    - pydantic-settings==2.9.1
    - email-validator==2.2.0
    - python-jose[cryptography]==3.3.0
    - httpx==0.28.1
    - groq==0.28.0
    - slowapi==0.1.9
    - sentry-sdk[fastapi]==2.28.0
    - langfuse==2.60.0
    - tenacity==9.1.2
    - python-multipart==0.0.20
    - aiofiles==24.1.0
    - python-dotenv==1.1.0

    # AI Services
    - sentence-transformers==4.1.0
    - transformers==4.51.3
    - accelerate==1.7.0
    - faiss-cpu==1.10.0
    - numpy==2.2.5
    - scipy==1.15.3

    # Dev / Testing
    - pytest==8.3.5
    - pytest-asyncio==0.26.0
    - pytest-cov==6.1.0
    - ruff==0.11.9
    - mypy==1.15.0
    - ipython==9.2.0
    - rich==14.0.0
